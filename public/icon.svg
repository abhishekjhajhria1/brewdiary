    <rect x="104" y="104" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.18"/>
    <rect x="212" y="104" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.42"/>
    <rect x="320" y="104" width="88" height="88" rx="16" fill="#b8742a"/>
    <rect x="104" y="212" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.70"/>
    <rect x="212" y="212" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.30"/>
    <rect x="320" y="212" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.14"/>
    <rect x="104" y="320" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.50"/>
    <rect x="212" y="320" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.86"/>
    <rect x="320" y="320" width="88" height="88" rx="16" fill="#1b1714" fill-opacity="0.26"/>
  </g>
</svg>
